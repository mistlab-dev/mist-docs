name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v -o mist-docs ./cmd/server

      - name: Test
        run: go test -v ./... || true  # 暂无测试，允许失败

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mist-docs-binary
          path: mist-docs
          retention-days: 7