name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: web
        run: npm install --legacy-peer-deps

      - name: Build Frontend
        working-directory: web
        run: npm run build

      - name: Build Backend
        run: |
          go mod download
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o mist-docs ./cmd/server

      - name: Package Release
        run: |
          mkdir -p release/web
          cp mist-docs release/
          cp -r web/dist/* release/web/
          cp configs/config.yaml release/config.yaml.example

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mist-docs-release
          path: release/
          retention-days: 3
