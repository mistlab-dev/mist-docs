name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: web
        run: |
          npm install --legacy-peer-deps
          ls node_modules/.bin/vite || echo "vite not found in .bin"
          ls node_modules/vite/package.json || echo "vite package not found"

      - name: Lint Frontend (vue-tsc)
        working-directory: web
        run: |
          npx vue-tsc --noEmit --skipLibCheck 2>&1 | grep -E 'SheetEditor|DocEditor|Docs\.vue' || true
          # Check SheetEditor specifically - fail on undefined template refs
          ERRORS=$(npx vue-tsc --noEmit --skipLibCheck 2>&1 | grep 'SheetEditor' || true)
          if [ -n "$ERRORS" ]; then
            echo "::error::SheetEditor has TypeScript errors:"\n"$ERRORS"
            exit 1
          fi
          echo "✅ SheetEditor type check passed"

      - name: Build Frontend
        working-directory: web
        run: node_modules/.bin/vite build

      - name: Build Backend
        run: |
          go mod download
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o mist-docs ./cmd/server

      - name: Package Release
        run: |
          mkdir -p release/web
          cp mist-docs release/
          cp -r web/dist/* release/web/
          cp configs/config.yaml release/config.yaml.example

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mist-docs-release
          path: release/
          retention-days: 3
